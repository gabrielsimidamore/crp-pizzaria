<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pizzaria Família Silva · Cardápio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;0,900;1,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --red: #C0392B;
    --red-dark: #99291d;
    --red-deep: #7a1f15;
    --cream: #FDF6EC;
    --cream-2: #f6ead6;
    --white: #ffffff;
    --ink: #2b1a16;
    --ink-soft: #6b574f;
    --ink-faint: #9a877f;
    --line: #ece0d0;
    --green: #2e7d4f;
    --green-soft: #e3f3e9;
    --hot: #f39c12;
    --new: #ffe9a8;
    --gold: #e8c87a;
    --shadow-sm: 0 2px 8px rgba(120, 60, 40, .07);
    --shadow-md: 0 10px 30px rgba(120, 50, 30, .12);
    --shadow-lg: 0 22px 50px rgba(110, 40, 25, .22);
    --r: 18px;
    --r-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1200px 500px at 80% -10%, #fbe7cf 0%, transparent 60%),
      var(--cream);
    line-height: 1.45;
    min-height: 100vh;
    font-size: 15px;
  }
  .serif { font-family: 'Playfair Display', Georgia, serif; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #e3d3bd; border-radius: 20px; border: 3px solid var(--cream); }
  ::-webkit-scrollbar-thumb:hover { background: #d6c0a4; }

  /* ============ APP SHELL ============ */
  .app {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 372px;
    gap: 28px;
    max-width: 1340px;
    margin: 0 auto;
    padding: 22px 24px 60px;
    align-items: start;
  }
  .main { min-width: 0; }

  /* ============ HEADER ============ */
  .header {
    position: relative;
    overflow: hidden;
    border-radius: var(--r);
    background:
      radial-gradient(900px 280px at 12% 120%, rgba(255,255,255,.12), transparent 60%),
      linear-gradient(135deg, var(--red) 0%, var(--red-dark) 55%, var(--red-deep) 100%);
    color: #fff;
    padding: 22px 24px;
    box-shadow: var(--shadow-md);
  }
  .header::after {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,.10) 1.3px, transparent 1.4px);
    background-size: 22px 22px;
    opacity: .35;
    pointer-events: none;
  }
  .header-inner {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: 18px;
    flex-wrap: wrap;
  }
  .logo {
    width: 76px; height: 76px;
    border-radius: 50%;
    flex-shrink: 0;
    background: #fff;
    padding: 3px;
    box-shadow: 0 6px 18px rgba(0,0,0,.28), inset 0 0 0 2px rgba(255,255,255,.5);
  }
  .logo img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: 50% 24%;
    border-radius: 50%;
    display: block;
  }
  .brand { flex: 1; min-width: 230px; }
  .brand h1 {
    font-weight: 800;
    font-size: clamp(26px, 3.4vw, 38px);
    line-height: 1.02;
    letter-spacing: .2px;
    text-shadow: 0 2px 0 rgba(0,0,0,.18);
  }
  .brand .pizza-dot { color: #ffd9a0; }
  .brand .addr {
    margin-top: 7px;
    font-size: 13.5px;
    color: rgba(255,255,255,.86);
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
  }
  .brand .addr .sep { opacity: .5; }
  .open-badge {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--green-soft);
    color: var(--green);
    font-weight: 700;
    font-size: 13px;
    padding: 9px 15px;
    border-radius: 999px;
    box-shadow: 0 4px 12px rgba(0,0,0,.18);
    white-space: nowrap;
  }
  .open-badge .pulse {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(46,125,79,.55);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(46,125,79,.5); }
    70% { box-shadow: 0 0 0 8px rgba(46,125,79,0); }
    100% { box-shadow: 0 0 0 0 rgba(46,125,79,0); }
  }

  /* ============ TOOLBAR ============ */
  .toolbar {
    margin: 20px 0 18px;
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
  }
  .cats {
    display: flex; gap: 9px; flex-wrap: wrap;
    flex: 1; min-width: 0;
  }
  .chip {
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink-soft);
    background: var(--white);
    border: 1.5px solid var(--line);
    padding: 9px 15px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .18s ease;
    white-space: nowrap;
    box-shadow: var(--shadow-sm);
  }
  .chip:hover { border-color: #e0b9b0; color: var(--red); transform: translateY(-1px); }
  .chip.active {
    background: var(--red); color: #fff; border-color: var(--red);
    box-shadow: 0 6px 16px rgba(192,57,43,.30);
  }
  .search {
    position: relative;
    flex-shrink: 0;
    width: 230px;
  }
  .search svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--ink-faint); }
  .search input {
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    background: var(--white);
    border: 1.5px solid var(--line);
    border-radius: 999px;
    padding: 10px 14px 10px 38px;
    box-shadow: var(--shadow-sm);
    transition: border-color .18s, box-shadow .18s;
  }
  .search input::placeholder { color: var(--ink-faint); }
  .search input:focus { outline: none; border-color: var(--red); box-shadow: 0 0 0 3px rgba(192,57,43,.12); }

  /* ============ SECTIONS / GRID ============ */
  .section-head {
    display: flex; align-items: center; gap: 12px;
    margin: 26px 2px 14px;
  }
  .section-head:first-of-type { margin-top: 4px; }
  .section-head h2 {
    font-weight: 700; font-size: 21px; color: var(--ink);
    display: flex; align-items: center; gap: 9px;
  }
  .section-head .rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--line), transparent); }
  .section-head .count { font-size: 12.5px; color: var(--ink-faint); font-weight: 600; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(232px, 1fr));
    gap: 16px;
  }

  .card {
    position: relative;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 0 0 16px;
    cursor: pointer;
    transition: transform .2s cubic-bezier(.2,.7,.3,1), box-shadow .2s, border-color .2s;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); border-color: #ecd9c4; }
  .card:active { transform: translateY(-2px); }

  .card-img {
    height: 116px;
    display: grid; place-items: center;
    font-size: 56px;
    background:
      radial-gradient(120px 90px at 50% 30%, rgba(255,255,255,.7), transparent 70%),
      linear-gradient(160deg, #fce4c6 0%, #f7d3a8 100%);
    border-bottom: 1px solid var(--line);
    position: relative;
    filter: saturate(1.05);
  }
  .card-img .emoji { filter: drop-shadow(0 6px 10px rgba(120,60,20,.28)); transition: transform .25s ease; }
  .card:hover .card-img .emoji { transform: scale(1.08) rotate(-3deg); }

  .tag {
    position: absolute; top: 10px; left: 10px;
    font-size: 11px; font-weight: 700;
    padding: 4px 9px; border-radius: 999px;
    letter-spacing: .2px;
    box-shadow: 0 3px 8px rgba(0,0,0,.12);
  }
  .tag.hot { background: linear-gradient(135deg, #f7a330, #ef7a1a); color: #fff; }
  .tag.new { background: var(--new); color: #8a6d12; }

  .card-body { padding: 12px 14px 0; flex: 1; display: flex; flex-direction: column; }
  .card-body h3 { font-size: 15.5px; font-weight: 700; color: var(--ink); line-height: 1.2; }
  .card-body p {
    margin-top: 5px; font-size: 12.7px; color: var(--ink-soft);
    line-height: 1.4; flex: 1;
    text-wrap: pretty;
  }
  .card-foot {
    margin-top: 12px; padding: 0 14px;
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .price { font-family: 'Playfair Display', serif; font-weight: 800; font-size: 22px; color: var(--red); line-height: 1; }
  .price small { font-size: 12px; font-weight: 600; opacity: .7; }
  .add-btn {
    width: 38px; height: 38px; flex-shrink: 0;
    border: none; border-radius: 50%;
    background: var(--red); color: #fff;
    font-size: 22px; line-height: 1;
    cursor: pointer;
    display: grid; place-items: center;
    box-shadow: 0 5px 14px rgba(192,57,43,.34);
    transition: transform .15s, background .15s;
  }
  .add-btn:hover { background: var(--red-dark); transform: scale(1.1); }
  .add-btn:active { transform: scale(.92); }
  .in-cart-flag {
    position: absolute; top: 10px; right: 10px;
    background: var(--green); color: #fff;
    min-width: 22px; height: 22px; padding: 0 6px;
    border-radius: 999px;
    font-size: 12px; font-weight: 700;
    display: none; align-items: center; justify-content: center;
    box-shadow: 0 3px 8px rgba(0,0,0,.18);
  }
  .card.has-qty .in-cart-flag { display: inline-flex; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--ink-faint);
    grid-column: 1 / -1;
  }
  .empty-state .big { font-size: 44px; margin-bottom: 10px; }

  /* ============ ORDER PANEL ============ */
  .order {
    position: sticky; top: 22px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--r);
    box-shadow: var(--shadow-md);
    display: flex; flex-direction: column;
    max-height: calc(100vh - 44px);
    overflow: hidden;
  }
  .order-head {
    padding: 18px 20px 14px;
    background: linear-gradient(135deg, #fff 0%, #fff6ea 100%);
    border-bottom: 1px solid var(--line);
  }
  .order-head h2 { font-size: 19px; font-weight: 700; display: flex; align-items: center; gap: 9px; }
  .order-head .sub { margin-top: 3px; font-size: 13px; color: var(--ink-soft); font-weight: 500; }
  .order-head .sub b { color: var(--red); }

  .order-list {
    flex: 1; overflow-y: auto;
    padding: 8px 14px;
    min-height: 90px;
  }
  .order-empty {
    text-align: center; color: var(--ink-faint);
    padding: 38px 16px;
  }
  .order-empty .ic { font-size: 40px; opacity: .55; margin-bottom: 8px; }
  .order-empty p { font-size: 13.5px; }

  .line {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 11px;
    align-items: center;
    padding: 11px 6px;
    border-bottom: 1px dashed var(--line);
    animation: slideIn .25s ease;
  }
  .line:last-child { border-bottom: none; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: none; } }

  .qty {
    display: flex; align-items: center; gap: 0;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 2px;
  }
  .qty button {
    width: 24px; height: 24px;
    border: none; background: transparent;
    color: var(--red); font-size: 16px; font-weight: 700;
    cursor: pointer; border-radius: 50%;
    display: grid; place-items: center; line-height: 1;
    transition: background .12s;
  }
  .qty button:hover { background: #fbe3dd; }
  .qty .n { min-width: 20px; text-align: center; font-weight: 700; font-size: 13.5px; }

  .line-info { min-width: 0; }
  .line-info .nm { font-size: 13.5px; font-weight: 600; color: var(--ink); line-height: 1.2; }
  .line-info .unit { font-size: 11.5px; color: var(--ink-faint); margin-top: 2px; }
  .line-total { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 15.5px; color: var(--red); white-space: nowrap; }

  .order-foot {
    border-top: 1px solid var(--line);
    padding: 14px 20px 18px;
    background: #fff;
  }
  .srow { display: flex; justify-content: space-between; font-size: 13.5px; color: var(--ink-soft); margin-bottom: 7px; }
  .srow.total {
    margin-top: 10px; padding-top: 11px;
    border-top: 1.5px dashed var(--line);
    font-size: 16px; color: var(--ink); font-weight: 700;
  }
  .srow.total .v { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 800; color: var(--red); }
  .srow .v { font-weight: 600; }

  .wa-btn {
    width: 100%; margin-top: 14px;
    font-family: inherit; font-size: 15.5px; font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #2bb24a, #1f9d3f);
    border: none; border-radius: 14px;
    padding: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 9px;
    box-shadow: 0 8px 20px rgba(31,157,63,.32);
    transition: transform .15s, box-shadow .15s, filter .15s;
  }
  .wa-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 26px rgba(31,157,63,.4); }
  .wa-btn:active:not(:disabled) { transform: translateY(0); }
  .wa-btn:disabled { background: #d8cdbf; color: #fff; cursor: not-allowed; box-shadow: none; }
  .wa-btn svg { width: 20px; height: 20px; }

  .clear-link {
    display: block; width: 100%; text-align: center;
    margin-top: 10px; font-size: 12.5px; color: var(--ink-faint);
    background: none; border: none; cursor: pointer; font-family: inherit;
    transition: color .15s;
  }
  .clear-link:hover { color: var(--red); }

  /* bump animation */
  .bump { animation: bump .4s ease; }
  @keyframes bump { 0%,100% { transform: scale(1); } 35% { transform: scale(1.18); } }

  /* ============ MOBILE BAR ============ */
  .mobile-bar { display: none; }

  @media (max-width: 920px) {
    .app { grid-template-columns: 1fr; padding-bottom: 110px; }
    .search { width: 100%; order: 2; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .cats { order: 1; }

    /* order panel becomes bottom sheet */
    .order {
      position: fixed; left: 0; right: 0; bottom: 0; top: auto;
      max-height: 78vh; height: 78vh;
      border-radius: 22px 22px 0 0;
      transform: translateY(calc(100% - 0px));
      transition: transform .32s cubic-bezier(.3,.8,.3,1);
      z-index: 60;
      box-shadow: 0 -10px 40px rgba(80,30,15,.25);
    }
    body.sheet-open .order { transform: translateY(0); }
    .sheet-grip {
      display: block; width: 44px; height: 5px; border-radius: 99px;
      background: #e0d2bf; margin: 9px auto 2px;
    }
    .order-head { cursor: pointer; }

    .mobile-bar {
      display: flex; align-items: center; gap: 12px;
      position: fixed; left: 12px; right: 12px; bottom: 12px;
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: #fff; padding: 12px 14px 12px 16px;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(150,40,25,.4);
      z-index: 55;
    }
    .mobile-bar .mb-info { flex: 1; min-width: 0; }
    .mobile-bar .mb-count { font-size: 12px; opacity: .85; }
    .mobile-bar .mb-total { font-family: 'Playfair Display', serif; font-weight: 800; font-size: 19px; }
    .mobile-bar .mb-go {
      background: #fff; color: var(--red); font-weight: 700; font-family: inherit;
      border: none; padding: 11px 18px; border-radius: 11px; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; gap: 7px;
    }
    body.sheet-open .mobile-bar { transform: translateY(140%); transition: transform .3s; }
    .sheet-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(40,15,10,.4);
      z-index: 50; opacity: 0; transition: opacity .3s;
    }
    body.sheet-open .sheet-backdrop { display: block; opacity: 1; }
    .sheet-close {
      display: inline-flex; margin-left: auto;
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--cream); border: 1px solid var(--line);
      align-items: center; justify-content: center; cursor: pointer;
      font-size: 16px; color: var(--ink-soft);
    }
  }
  @media (min-width: 921px) { .sheet-grip, .sheet-close, .sheet-backdrop { display: none; } }

  @media (max-width: 460px) {
    .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .card-img { height: 92px; font-size: 44px; }
    .card-body h3 { font-size: 14px; }
    .card-body p { font-size: 12px; }
    .price { font-size: 19px; }
    .brand h1 { font-size: 23px; }
    .logo { width: 60px; height: 60px; }
  }
</style>
</head>
<body>
  <div class="app">
    <!-- ============ MAIN COLUMN ============ -->
    <div class="main">
      <header class="header">
        <div class="header-inner">
          <div class="logo"><img src="assets/logo-familia-silva.png" alt="Pizzaria Família Silva" /></div>
          <div class="brand">
            <h1 class="serif">Pizzaria Família Silva <span class="pizza-dot">🍕</span></h1>
            <div class="addr">
              <span>Rua Padre Kassabian, 636B</span><span class="sep">·</span>
              <span>Osasco</span><span class="sep">·</span>
              <span>(11) 94962-3319</span>
            </div>
          </div>
          <div class="open-badge"><span class="pulse"></span>⏰ Aberto até 00h</div>
        </div>
      </header>

      <div class="toolbar">
        <div class="cats" id="cats"></div>
        <div class="search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="text" id="search" placeholder="Buscar no cardápio..." autocomplete="off" />
        </div>
      </div>

      <div id="menu"></div>
    </div>

    <!-- ============ ORDER PANEL ============ -->
    <aside class="order" id="order">
      <div class="sheet-grip"></div>
      <div class="order-head" id="orderHead">
        <h2>🛒 Seu Pedido <button class="sheet-close" id="sheetClose" aria-label="Fechar">✕</button></h2>
        <div class="sub" id="orderSub">Nenhum item ainda</div>
      </div>
      <div class="order-list" id="orderList"></div>
      <div class="order-foot">
        <div class="srow"><span>Subtotal</span><span class="v" id="subtotal">R$ 0,00</span></div>
        <div class="srow"><span>Taxa de entrega</span><span class="v">R$ 5,00</span></div>
        <div class="srow total"><span>Total</span><span class="v" id="total">R$ 5,00</span></div>
        <button class="wa-btn" id="waBtn" disabled>
          <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 .5C7.4.5.5 7.4.5 16c0 2.8.7 5.4 2 7.7L.5 31.5l8-2.1c2.2 1.2 4.8 1.9 7.5 1.9 8.6 0 15.5-6.9 15.5-15.5S24.6.5 16 .5zm0 28.2c-2.5 0-4.8-.7-6.8-1.8l-.5-.3-4.7 1.2 1.3-4.6-.3-.5A12.5 12.5 0 1 1 28.5 16 12.5 12.5 0 0 1 16 28.7zm7-9.3c-.4-.2-2.3-1.1-2.6-1.3s-.6-.2-.9.2-1 1.3-1.2 1.5-.4.3-.8.1a10.2 10.2 0 0 1-3-1.9 11.4 11.4 0 0 1-2.1-2.6c-.2-.4 0-.6.2-.8l.6-.7c.2-.2.2-.4.4-.6s0-.5 0-.7-.9-2.2-1.3-3-.6-.6-.9-.6h-.7a1.4 1.4 0 0 0-1 .5 4.2 4.2 0 0 0-1.3 3.1c0 1.9 1.3 3.6 1.5 3.9s2.7 4.1 6.5 5.7c3.2 1.4 3.9 1.1 4.6 1.1a3.8 3.8 0 0 0 2.5-1.8 3.1 3.1 0 0 0 .2-1.8c-.1-.2-.4-.3-.8-.5z"/></svg>
          Enviar pelo WhatsApp
        </button>
        <button class="clear-link" id="clearBtn" style="display:none;">Limpar pedido</button>
      </div>
    </aside>
  </div>

  <!-- mobile floating bar -->
  <div class="sheet-backdrop" id="backdrop"></div>
  <div class="mobile-bar" id="mobileBar" style="display:none;">
    <div class="mb-info">
      <div class="mb-count" id="mbCount">Nenhum item</div>
      <div class="mb-total" id="mbTotal">R$ 0,00</div>
    </div>
    <button class="mb-go" id="mbGo">Ver pedido →</button>
  </div>

<script>
  // ============ DATA ============
  const CATS = [
    { id: 'all',      label: 'Todos' },
    { id: 'salgadas', label: '🍕 Pizzas Salgadas' },
    { id: 'doces',    label: '🍫 Pizzas Doces' },
    { id: 'lanches',  label: '🍔 Lanches' },
    { id: 'bebidas',  label: '🥤 Bebidas' },
  ];

  const MENU = [
    // Pizzas Salgadas
    { id: 's1', cat: 'salgadas', emoji: '🍕', name: 'Calabresa', desc: 'Calabresa fatiada, cebola e azeitona', price: 45, tag: 'hot' },
    { id: 's2', cat: 'salgadas', emoji: '🍗', name: 'Frango c/ Catupiry', desc: 'Frango desfiado e catupiry cremoso', price: 48 },
    { id: 's3', cat: 'salgadas', emoji: '🍕', name: 'Portuguesa', desc: 'Presunto, ovo, cebola, pimentão, azeitona', price: 47, tag: 'hot' },
    { id: 's4', cat: 'salgadas', emoji: '🧀', name: 'Quatro Queijos', desc: 'Mussarela, parmesão, catupiry e cheddar', price: 52 },
    { id: 's5', cat: 'salgadas', emoji: '🍅', name: 'Margherita', desc: 'Molho de tomate, mussarela e manjericão', price: 42 },
    { id: 's6', cat: 'salgadas', emoji: '🥓', name: 'Frango c/ Bacon', desc: 'Frango, bacon crocante e cream cheese', price: 50, tag: 'new' },
    { id: 's7', cat: 'salgadas', emoji: '🐟', name: 'Atum', desc: 'Atum, cebola e azeitonas', price: 46 },
    { id: 's8', cat: 'salgadas', emoji: '🌴', name: 'Palmito', desc: 'Palmito pupunha, mussarela e tomate', price: 47 },
    { id: 's9', cat: 'salgadas', emoji: '🥦', name: 'Brócolis c/ Bacon', desc: 'Brócolis, bacon e alho dourado', price: 48 },
    { id: 's10', cat: 'salgadas', emoji: '🍕', name: 'Pepperoni', desc: 'Pepperoni importado e mussarela', price: 54, tag: 'new' },
    // Pizzas Doces
    { id: 'd1', cat: 'doces', emoji: '🍓', name: 'Chocolate c/ Morango', desc: 'Chocolate ao leite e morangos frescos', price: 48, tag: 'hot' },
    { id: 'd2', cat: 'doces', emoji: '🍫', name: 'Brigadeiro', desc: 'Brigadeiro, granulado e leite condensado', price: 46 },
    { id: 'd3', cat: 'doces', emoji: '🍌', name: 'Banana c/ Canela', desc: 'Banana, canela, açúcar e leite condensado', price: 44 },
    { id: 'd4', cat: 'doces', emoji: '🧀', name: 'Romeu e Julieta', desc: 'Goiabada cremosa e mussarela', price: 44, tag: 'new' },
    { id: 'd5', cat: 'doces', emoji: '🥥', name: 'Prestígio', desc: 'Chocolate e coco ralado', price: 46 },
    { id: 'd6', cat: 'doces', emoji: '🍫', name: 'Nutella c/ Morango', desc: 'Nutella e morangos fatiados', price: 52, tag: 'hot' },
    // Lanches
    { id: 'l1', cat: 'lanches', emoji: '🍔', name: 'X-Bacon Especial', desc: 'Hambúrguer artesanal, bacon, queijo e alface', price: 28, tag: 'hot' },
    { id: 'l2', cat: 'lanches', emoji: '🍗', name: 'X-Frango', desc: 'Frango empanado, queijo e maionese', price: 25 },
    { id: 'l3', cat: 'lanches', emoji: '🥗', name: 'X-Salada', desc: 'Hambúrguer, queijo, alface e tomate', price: 22 },
    // Bebidas
    { id: 'b1', cat: 'bebidas', emoji: '🥤', name: 'Refrigerante Lata', desc: 'Coca-Cola, Guaraná ou Sprite', price: 6 },
    { id: 'b2', cat: 'bebidas', emoji: '🥤', name: 'Refrigerante 2L', desc: 'Coca-Cola ou Guaraná', price: 12 },
    { id: 'b3', cat: 'bebidas', emoji: '🍊', name: 'Suco Natural', desc: 'Laranja, limão ou maracujá', price: 10, tag: 'new' },
    { id: 'b4', cat: 'bebidas', emoji: '💧', name: 'Água Mineral', desc: '500ml com ou sem gás', price: 4 },
  ];

  const CAT_LABEL = {
    salgadas: '🍕 Pizzas Salgadas',
    doces: '🍫 Pizzas Doces',
    lanches: '🍔 Lanches',
    bebidas: '🥤 Bebidas',
  };
  const DELIVERY = 5;
  const WA_NUMBER = '5511945414500';

  // ============ STATE ============
  let activeCat = 'all';
  let query = '';
  const cart = {}; // id -> qty

  const BRL = n => 'R$ ' + n.toFixed(2).replace('.', ',');

  // ============ RENDER CATEGORIES ============
  const catsEl = document.getElementById('cats');
  CATS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'chip' + (c.id === 'all' ? ' active' : '');
    b.textContent = c.label;
    b.dataset.cat = c.id;
    b.onclick = () => { activeCat = c.id; document.querySelectorAll('.chip').forEach(x => x.classList.toggle('active', x.dataset.cat === c.id)); renderMenu(); };
    catsEl.appendChild(b);
  });

  // ============ RENDER MENU ============
  const menuEl = document.getElementById('menu');
  function renderMenu() {
    const q = query.trim().toLowerCase();
    const filtered = MENU.filter(item => {
      const okCat = activeCat === 'all' || item.cat === activeCat;
      const okQ = !q || item.name.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q);
      return okCat && okQ;
    });

    menuEl.innerHTML = '';
    if (filtered.length === 0) {
      menuEl.innerHTML = '<div class="empty-state"><div class="big">🔍</div><p>Nenhum item encontrado.<br>Tente outra busca ou categoria.</p></div>';
      return;
    }

    // group by category, preserving order
    const order = ['salgadas', 'doces', 'lanches', 'bebidas'];
    order.forEach(catId => {
      const items = filtered.filter(i => i.cat === catId);
      if (!items.length) return;
      const head = document.createElement('div');
      head.className = 'section-head';
      head.innerHTML = `<h2>${CAT_LABEL[catId]}</h2><div class="rule"></div><span class="count">${items.length} ${items.length === 1 ? 'item' : 'itens'}</span>`;
      menuEl.appendChild(head);

      const grid = document.createElement('div');
      grid.className = 'grid';
      items.forEach(item => grid.appendChild(makeCard(item)));
      menuEl.appendChild(grid);
    });
  }

  function makeCard(item) {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.id = item.id;
    const tagHtml = item.tag === 'hot' ? '<span class="tag hot">🔥 Mais pedido</span>'
                  : item.tag === 'new' ? '<span class="tag new">✨ Novidade</span>' : '';
    el.innerHTML = `
      <div class="card-img">
        ${tagHtml}
        <span class="in-cart-flag" data-flag="${item.id}"></span>
        <span class="emoji">${item.emoji}</span>
      </div>
      <div class="card-body">
        <h3>${item.name}</h3>
        <p>${item.desc}</p>
      </div>
      <div class="card-foot">
        <div class="price">${BRL(item.price).replace('R$ ', '<small>R$</small> ')}</div>
        <button class="add-btn" aria-label="Adicionar ${item.name}">+</button>
      </div>`;
    el.querySelector('.add-btn').onclick = (e) => { e.stopPropagation(); addItem(item.id); };
    el.onclick = () => addItem(item.id);
    return el;
  }

  // ============ CART ============
  function addItem(id) { cart[id] = (cart[id] || 0) + 1; renderCart(); pulseCount(); }
  function decItem(id) { if (!cart[id]) return; cart[id]--; if (cart[id] <= 0) delete cart[id]; renderCart(); }
  function clearCart() { for (const k in cart) delete cart[k]; renderCart(); }

  const orderList = document.getElementById('orderList');
  const orderSub = document.getElementById('orderSub');
  const subtotalEl = document.getElementById('subtotal');
  const totalEl = document.getElementById('total');
  const waBtn = document.getElementById('waBtn');
  const clearBtn = document.getElementById('clearBtn');
  const mobileBar = document.getElementById('mobileBar');
  const mbCount = document.getElementById('mbCount');
  const mbTotal = document.getElementById('mbTotal');

  function cartEntries() { return Object.keys(cart).map(id => ({ item: MENU.find(m => m.id === id), qty: cart[id] })); }
  function totalQty() { return Object.values(cart).reduce((a, b) => a + b, 0); }

  function renderCart() {
    const entries = cartEntries();
    const qty = totalQty();

    // update card flags
    document.querySelectorAll('.card').forEach(c => {
      const id = c.dataset.id;
      const flag = c.querySelector('[data-flag]');
      if (cart[id]) { c.classList.add('has-qty'); flag.textContent = cart[id]; }
      else { c.classList.remove('has-qty'); }
    });

    if (entries.length === 0) {
      orderList.innerHTML = '<div class="order-empty"><div class="ic">🍕</div><p>Nenhum item ainda.<br>Adicione delícias do cardápio!</p></div>';
      orderSub.textContent = 'Nenhum item ainda';
      waBtn.disabled = true;
      clearBtn.style.display = 'none';
    } else {
      orderList.innerHTML = '';
      entries.forEach(({ item, qty }) => {
        const line = document.createElement('div');
        line.className = 'line';
        line.innerHTML = `
          <div class="qty">
            <button aria-label="Remover um">−</button>
            <span class="n">${qty}</span>
            <button aria-label="Adicionar um">+</button>
          </div>
          <div class="line-info">
            <div class="nm">${item.name}</div>
            <div class="unit">${BRL(item.price)} cada</div>
          </div>
          <div class="line-total">${BRL(item.price * qty)}</div>`;
        const btns = line.querySelectorAll('button');
        btns[0].onclick = () => decItem(item.id);
        btns[1].onclick = () => addItem(item.id);
        orderList.appendChild(line);
      });
      orderSub.innerHTML = `<b>${qty}</b> ${qty === 1 ? 'item' : 'itens'} no pedido`;
      waBtn.disabled = false;
      clearBtn.style.display = 'block';
    }

    const subtotal = entries.reduce((s, { item, qty }) => s + item.price * qty, 0);
    const total = entries.length ? subtotal + DELIVERY : 0;
    subtotalEl.textContent = BRL(subtotal);
    totalEl.textContent = BRL(entries.length ? total : DELIVERY);

    // mobile bar
    if (qty > 0) {
      mobileBar.style.display = 'flex';
      mbCount.textContent = `${qty} ${qty === 1 ? 'item' : 'itens'}`;
      mbTotal.textContent = BRL(total);
    } else {
      mobileBar.style.display = 'none';
      closeSheet();
    }
  }

  // pulse animation on the cart heading count
  function pulseCount() {
    orderSub.classList.remove('bump'); void orderSub.offsetWidth; orderSub.classList.add('bump');
    mbTotal.classList.remove('bump'); void mbTotal.offsetWidth; mbTotal.classList.add('bump');
  }

  clearBtn.onclick = clearCart;

  // ============ WHATSAPP ============
  waBtn.onclick = () => {
    const entries = cartEntries();
    if (!entries.length) return;
    const subtotal = entries.reduce((s, { item, qty }) => s + item.price * qty, 0);
    const total = subtotal + DELIVERY;

    let msg = '🍕 *Olá! Gostaria de fazer um pedido:*\n\n';
    entries.forEach(({ item, qty }) => {
      msg += `- ${qty}x ${item.name} — ${BRL(item.price * qty)}\n`;
    });
    msg += `\n💰 *Subtotal:* ${BRL(subtotal)}\n`;
    msg += `🛵 *Taxa de entrega:* ${BRL(DELIVERY)}\n`;
    msg += `✅ *Total: ${BRL(total)}*\n\n`;
    msg += '_Aguardo confirmação do pedido!_ 🙏';

    window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
  };

  // ============ SEARCH ============
  document.getElementById('search').addEventListener('input', e => { query = e.target.value; renderMenu(); renderCart(); });

  // ============ MOBILE SHEET ============
  function openSheet() { document.body.classList.add('sheet-open'); }
  function closeSheet() { document.body.classList.remove('sheet-open'); }
  document.getElementById('mbGo').onclick = openSheet;
  document.getElementById('sheetClose').onclick = closeSheet;
  document.getElementById('backdrop').onclick = closeSheet;

  // ============ INIT ============
  renderMenu();
  renderCart();
</script>
</body>
</html>
